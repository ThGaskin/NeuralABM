perform_sweep: True
parameter_space:
  num_epochs: 10000
  write_start: 1
  write_every: 1
  write_predictions_start: 9999
  write_predictions_every: 1
  seed: !sweep
    default: 0
    range: [40]
  Migration:
    Data:
      stock_data: data/Migration/UN_stock_data_ext.nc
      net_migration: data/Migration/UN_net_migration.nc
      total_population: data/Migration/UN_total_population.nc
      training_range: [1990, 2021]
    NeuralNet:
      num_layers: 5
      nodes_per_layer:
        default: 20
      activation_funcs:
        default: silu
        layer_specific:
          1: swish
          -1: abs
    Training:
      training_sigma: 0.00