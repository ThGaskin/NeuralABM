loss:
  based_on:
    - .creator.multiverse
    - .plot.facet_grid.line
  select_and_combine:
    fields:
      data:
        path: output_data/Loss
        transform:
          - .sel: [!dag_prev , {'kind': 'Total loss'}] # This is xarray syntax
  hue: optimizer # Plot the optimizer to the hue dimension -- you can also change this to 'row' or 'col'
  x: batch
  helpers:
    set_scales:
      y: log